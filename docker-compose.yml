services:
  backend:
    build: ./backend
    command: sh -c "rm -f iot_monitoring.db && uvicorn app.main:app --host 0.0.0.0 --port 9000"
    environment:
      SENSOR_SIMULATOR_URL: http://sensor:9001
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/docs')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sensor:
    build: ./sensor
    environment:
      BACKEND_URL: http://backend:9000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9001:9001"
